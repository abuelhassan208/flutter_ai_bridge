name: flutter_ai_bridge
description: A unified Flutter package for AI integration — supports OpenAI, Gemini, Claude with smart routing, conversation management, cost control, and ready-made UI widgets.
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  ai_bridge_core:
    path: ../ai_bridge_core
  ai_bridge_ui:
    path: ../ai_bridge_ui
resolution: workspace
