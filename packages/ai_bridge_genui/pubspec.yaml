name: ai_bridge_genui
description: "Server-Driven Generative UI framework for flutter_ai_bridge. Dynamically render native Flutter widgets from LLM tool calls using strict JSON Schema."
version: 1.0.0
homepage: https://github.com/your-org/flutter_ai_bridge
repository: https://github.com/your-org/flutter_ai_bridge/tree/main/packages/ai_bridge_genui
issue_tracker: https://github.com/your-org/flutter_ai_bridge/issues
environment:
  sdk: ^3.6.0
  flutter: ">=3.24.0"

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  ai_bridge_core: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

